<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>sim-desk · 世界</title>
<style>
  body { margin: 0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background: #1a1a1a;
         color: #eee; display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 24px; }
  h1 { font-size: 16px; font-weight: 600; margin: 4px 0; }
  .hint { font-size: 13px; color: #999; text-align: center; max-width: 640px; }
  #view { border-radius: 10px; cursor: crosshair; touch-action: none; max-width: 90vw; background: #000; }
  button { background: #2b6cb0; color: #fff; border: 0; border-radius: 8px; padding: 8px 16px;
           font-size: 14px; cursor: pointer; }
  .row { display: flex; gap: 12px; align-items: center; }
  code { background: #333; padding: 2px 6px; border-radius: 4px; }
</style>
</head>
<body>
  <h1>sim-desk · 模拟的真实世界</h1>
  <div class="hint">在桌面上按住拖动 = 移动笔。这是世界自己的界面;ANIMA 只是隔着接口观测它,不会替它复位。</div>
  <img id="view" width="640" height="480" alt="desk" />
  <div class="row">
    <button id="reset">复位</button>
    <span class="hint">笔的位置:<code id="pos">-</code></span>
  </div>
<script>
  const view = document.getElementById("view");
  const posEl = document.getElementById("pos");
  let dragging = false;

  async function refresh() {
    const r = await fetch("/perceive");
    const d = await r.json();
    view.src = "data:image/png;base64," + d.image_b64;
    posEl.textContent = "[" + d.state.pen.map((v) => v.toFixed(2)).join(", ") + "]";
  }

  async function moveTo(ev) {
    const rect = view.getBoundingClientRect();
    const x = Math.min(1, Math.max(0, (ev.clientX - rect.left) / rect.width));
    const y = Math.min(1, Math.max(0, (ev.clientY - rect.top) / rect.height));
    await fetch("/invoke", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: "move_pen", args: { x, y } }),
    });
    await refresh();
  }

  view.addEventListener("pointerdown", (e) => { dragging = true; view.setPointerCapture(e.pointerId); moveTo(e); });
  view.addEventListener("pointermove", (e) => { if (dragging) moveTo(e); });
  view.addEventListener("pointerup", () => { dragging = false; });
  document.getElementById("reset").onclick = async () => { await fetch("/reset", { method: "POST" }); await refresh(); };

  refresh();
  setInterval(() => { if (!dragging) refresh(); }, 800); // 定时刷新,拖动时不打断
</script>
</body>
</html>
